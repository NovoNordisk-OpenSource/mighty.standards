version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      r-lib-actions:                                                                                                                              
        patterns:                                                                                                                                 
          - "r-lib/actions/*"
