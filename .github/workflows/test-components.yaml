---
name: Test components
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
jobs:
  test-components:
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} (R ${{ matrix.config.r }}${{ matrix.config.cran-date && format(', {0}', matrix.config.cran-date) || '' }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        config:
          - r: '4.3.1'
            cran-date: '2023-10-25'
          - r: '4.4.1'
            cran-date: '2024-08-06'
          - r: '4.5.2'
            cran-date: '2025-12-05'
        include:
          - os: macos-latest
            config: { r: release }
          - os: windows-latest
            config: { r: release }
          - os: ubuntu-latest
            config: { r: devel, http-user-agent: release }
          - os: ubuntu-latest
            config: { r: release }
          - os: ubuntu-latest
            config: { r: oldrel-1 }
    env:
      R_KEEP_PKG_SOURCE: true
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: ${{ !matrix.config.cran-date }}
          cran: ${{ matrix.config.cran-date && format('https://packagemanager.posit.co/cran/{0}', matrix.config.cran-date) || '' }}
          extra-repositories: ${{ matrix.config.cran-date && 'https://novonordisk-opensource.r-universe.dev' || '' }}
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.
      - name: Run component tests
        run: |
          test_files <- list.files(
            path = "components",
            pattern = "^test-.*\\.R$",
            recursive = TRUE,
            full.names = TRUE
          )
          results <- lapply(test_files, testthat::test_file, stop_on_failure = TRUE)
        shell: Rscript {0}
