---
name: Test components
on:
  push:
    branches:
      - main
      - 'dev/**'
  pull_request:
    branches:
      - main
      - 'dev/**'
  workflow_dispatch:
permissions: {}
jobs:
  test-components:
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} (R ${{ matrix.config.r }}${{ matrix.config.cran-date && format(', {0}', matrix.config.cran-date) || '' }})
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        config:
          - r: '4.3.1'
            cran-date: '2023-10-25'
          - r: '4.4.1'
            cran-date: '2024-08-06'
          - r: '4.5.2'
            cran-date: '2025-12-05'
        include:
          - os: macos-latest
            config: { r: release }
          - os: windows-latest
            config: { r: release }
          - os: ubuntu-latest
            config: { r: devel, http-user-agent: release }
          - os: ubuntu-latest
            config: { r: release }
          - os: ubuntu-latest
            config: { r: oldrel-1 }
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: r-lib/actions/setup-r@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: ${{ !matrix.config.cran-date }}
          cran: ${{ matrix.config.cran-date && format('https://packagemanager.posit.co/cran/{0}', matrix.config.cran-date) || '' }}
          extra-repositories: ${{ matrix.config.cran-date && 'https://novonordisk-opensource.r-universe.dev' || '' }}
      - uses: r-lib/actions/setup-r-dependencies@d3c5be51b12e724e68f33216ca3c148b66d5f0b6 # v2.12.1
      - name: Run component tests
        run: |
          dirs <- list.dirs("components", recursive = FALSE)
          lapply(dirs, testthat::test_dir, stop_on_failure = TRUE)
        shell: Rscript {0}
