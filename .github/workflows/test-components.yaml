---
name: Test components
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
jobs:
  test-components:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }}, ${{ matrix.config.source }})
    strategy:
      fail-fast: false
      matrix:
        config:
          # Current versions
          - os: macos-latest
            r: release
            source: current
            use-public-rspm: true
          - os: windows-latest
            r: release
            source: current
            use-public-rspm: true
          - os: ubuntu-latest
            r: devel
            source: current
            use-public-rspm: true
            http-user-agent: release
          - os: ubuntu-latest
            r: release
            source: current
            use-public-rspm: true
          - os: ubuntu-latest
            r: oldrel-1
            source: current
            use-public-rspm: true
          # NN versions
          - os: macos-latest
            r: '4.3.1'
            source: nn-2023-10-25
            use-public-rspm: false
            cran: https://packagemanager.posit.co/cran/2023-10-25
          - os: windows-latest
            r: '4.3.1'
            source: nn-2023-10-25
            use-public-rspm: false
            cran: https://packagemanager.posit.co/cran/2023-10-25
          - os: ubuntu-latest
            r: '4.3.1'
            source: nn-2023-10-25
            use-public-rspm: false
            cran: https://packagemanager.posit.co/cran/2023-10-25
          - os: macos-latest
            r: '4.4.1'
            source: nn-2024-08-06
            use-public-rspm: false
            cran: https://packagemanager.posit.co/cran/2024-08-06
          - os: windows-latest
            r: '4.4.1'
            source: nn-2024-08-06
            use-public-rspm: false
            cran: https://packagemanager.posit.co/cran/2024-08-06
          - os: ubuntu-latest
            r: '4.4.1'
            source: nn-2024-08-06
            use-public-rspm: false
            cran: https://packagemanager.posit.co/cran/2024-08-06
          - os: macos-latest
            r: '4.5.2'
            source: nn-2025-12-05
            use-public-rspm: false
            cran: https://packagemanager.posit.co/cran/2025-12-05
          - os: windows-latest
            r: '4.5.2'
            source: nn-2025-12-05
            use-public-rspm: false
            cran: https://packagemanager.posit.co/cran/2025-12-05
          - os: ubuntu-latest
            r: '4.5.2'
            source: nn-2025-12-05
            use-public-rspm: false
            cran: https://packagemanager.posit.co/cran/2025-12-05
    env:
      R_KEEP_PKG_SOURCE: true
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: ${{ matrix.config.use-public-rspm }}
          cran: ${{ matrix.config.cran }}
          extra-repositories: ${{ matrix.config.cran && 'https://novonordisk-opensource.r-universe.dev' || '' }}
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: local::.
      - name: Run component tests
        run: |
          test_files <- list.files(
            path = "components",
            pattern = "^test-.*\\.R$",
            recursive = TRUE,
            full.names = TRUE
          )
          results <- lapply(test_files, testthat::test_file, stop_on_failure = TRUE)
        shell: Rscript {0}
